<p class="font-body-md text-body-md text-on-surface-variant">Welcome back to RoyalRoot Interiors. Access your bespoke collection.</p>
</div>
<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="space-y-2 group">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest block transition-colors group-focus-within:text-secondary" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-3 font-body-md text-body-md text-on-surface focus:ring-0 focus:border-secondary transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="curator@ethereal.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2 group">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest block transition-colors group-focus-within:text-secondary" for="password">Password</label>
<a class="font-label-sm text-[10px] text-on-surface-variant hover:text-secondary uppercase tracking-[0.15em] transition-colors" href="#">Forgot Password?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-3 font-body-md text-body-md text-on-surface focus:ring-0 focus:border-secondary transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="w-full bg-primary text-on-primary py-5 font-label-md text-label-md uppercase tracking-[0.2em] hover:bg-secondary transition-all duration-500 rounded-none shadow-[0_10px_20px_rgba(0,0,0,0.1)] active:scale-[0.98]" type="submit">
